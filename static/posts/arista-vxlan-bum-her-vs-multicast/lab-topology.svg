<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1040" viewBox="0 0 1440 1040" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="dot" viewBox="0 0 6 6" refX="3" refY="3" markerWidth="6" markerHeight="6"><circle cx="3" cy="3" r="2.5" fill="#888780"/></marker>
  </defs>

  <rect x="0" y="0" width="1440" height="1040" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="42" font-size="22" font-weight="bold" fill="#2C2C2A">EVPN / VXLAN lab - physical topology &amp; IP addressing</text>
  <text x="40" y="66" font-size="13" fill="#5F5E5A">Arista vEOS-lab 4.33.1.1F  |  OSPF area 0 underlay  |  PIM-SM multicast BUM (RP on Border) / HER verified in lab</text>

  <!-- ================= LINKS (drawn first, under nodes) ================= -->

  <!-- Underlay /31 links -->
  <g stroke="#378ADD" stroke-width="1.6" fill="none">
    <line x1="640" y1="102" x2="400" y2="248"/>   <!-- L1 Border-Spine1 -->
    <line x1="700" y1="102" x2="930" y2="248"/>   <!-- L2 Border-Spine2 -->
    <line x1="350" y1="306" x2="240" y2="524"/>   <!-- L3 Spine1-Leaf1 -->
    <line x1="410" y1="306" x2="585" y2="524"/>   <!-- L4 Spine1-Leaf2 -->
    <line x1="440" y1="306" x2="1000" y2="524"/>  <!-- L5 Spine1-Leaf3 -->
    <line x1="905" y1="306" x2="300" y2="524"/>   <!-- L6 Spine2-Leaf1 -->
    <line x1="945" y1="306" x2="655" y2="524"/>   <!-- L7 Spine2-Leaf2 -->
    <line x1="1000" y1="306" x2="1065" y2="524"/> <!-- L8 Spine2-Leaf3 -->
  </g>

  <!-- MLAG peer link (Leaf1 - Leaf2) -->
  <line x1="330" y1="555" x2="540" y2="555" stroke="#D85A30" stroke-width="1.8" stroke-dasharray="7 5"/>

  <!-- MLAG uplinks to Switch -->
  <g stroke="#D85A30" stroke-width="1.6" fill="none">
    <line x1="250" y1="582" x2="410" y2="800"/>
    <line x1="600" y1="582" x2="455" y2="800"/>
  </g>

  <!-- Host / access links -->
  <g stroke="#888780" stroke-width="1.5" fill="none">
    <line x1="200" y1="582" x2="165" y2="800"/>   <!-- Leaf1 Et3 - VPC1 -->
    <line x1="1030" y1="582" x2="975" y2="800"/>  <!-- Leaf3 Et1 - VPC2 -->
    <line x1="1090" y1="582" x2="1155" y2="800"/> <!-- Leaf3 Et2 - VPC3 -->
    <line x1="750" y1="73" x2="1170" y2="73"/>    <!-- Border Et1 - Test_Server -->
  </g>

  <!-- Interface tags (underlay) -->
  <g font-size="10.5" fill="#185FA5">
    <text x="620" y="118">Et5</text>       <text x="408" y="240">Et5</text>
    <text x="704" y="118">Et4</text>        <text x="905" y="240">Et4</text>
    <text x="330" y="322">Et1</text>        <text x="248" y="514">Et1</text>
    <text x="416" y="322">Et2</text>        <text x="572" y="514">Et2</text>
    <text x="448" y="322">Et4</text>        <text x="998" y="514">Et4</text>
    <text x="878" y="322">Et2</text>        <text x="306" y="514">Et2</text>
    <text x="950" y="322">Et1</text>        <text x="656" y="514">Et1</text>
    <text x="1006" y="322">Et3</text>       <text x="1072" y="514">Et3</text>
  </g>

  <!-- Subnet labels (underlay) -->
  <g font-size="11" fill="#0C447C" font-weight="bold">
    <text x="470" y="176">10.0.101.0/31</text>
    <text x="812" y="176">10.0.102.0/31</text>
    <text x="188" y="420">10.0.11.0/31</text>
    <text x="470" y="420">10.0.12.0/31</text>
    <text x="742" y="392">10.0.13.0/31</text>
    <text x="512" y="470">10.0.21.0/31</text>
    <text x="792" y="420">10.0.22.0/31</text>
    <text x="1088" y="420">10.0.23.0/31</text>
  </g>

  <!-- MLAG labels -->
  <g font-size="10.5" fill="#993C1D">
    <text x="435" y="546" text-anchor="middle" font-weight="bold">Po100 peer-link (Et8)</text>
    <text x="435" y="574" text-anchor="middle">Vlan4094  169.254.1.0/30</text>
    <text x="240" y="598">Et4</text>
    <text x="596" y="598">Et4</text>
    <text x="430" y="788" text-anchor="middle" font-weight="bold">Po20 (mlag 20) - VLAN 20</text>
  </g>

  <!-- Access link labels -->
  <g font-size="10.5" fill="#5F5E5A">
    <text x="120" y="700">Et3 - VLAN 10</text>
    <text x="988" y="700">Et1 - VLAN 20</text>
    <text x="1120" y="700">Et2 - VLAN 30</text>
    <text x="770" y="66">Et1</text>
  </g>

  <!-- ================= NODES ================= -->

  <!-- Border (purple) -->
  <g>
    <rect x="590" y="44" width="160" height="58" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
    <text x="670" y="70" font-size="15" font-weight="bold" fill="#3C3489" text-anchor="middle">Border</text>
    <text x="670" y="90" font-size="11" fill="#534AB7" text-anchor="middle">Lo0 10.255.255.1/32 - RP</text>
  </g>

  <!-- Spine1 / Spine2 (blue) -->
  <g>
    <rect x="300" y="248" width="160" height="58" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
    <text x="380" y="274" font-size="15" font-weight="bold" fill="#0C447C" text-anchor="middle">Spine1</text>
    <text x="380" y="294" font-size="11" fill="#185FA5" text-anchor="middle">Lo0 10.255.255.11/32</text>
  </g>
  <g>
    <rect x="880" y="248" width="160" height="58" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
    <text x="960" y="274" font-size="15" font-weight="bold" fill="#0C447C" text-anchor="middle">Spine2</text>
    <text x="960" y="294" font-size="11" fill="#185FA5" text-anchor="middle">Lo0 10.255.255.12/32</text>
  </g>

  <!-- Leaf1 / Leaf2 / Leaf3 (teal) -->
  <g>
    <rect x="170" y="524" width="160" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
    <text x="250" y="550" font-size="15" font-weight="bold" fill="#085041" text-anchor="middle">Leaf1</text>
    <text x="250" y="570" font-size="11" fill="#0F6E56" text-anchor="middle">Lo0 10.255.255.21/32</text>
  </g>
  <g>
    <rect x="540" y="524" width="160" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
    <text x="620" y="550" font-size="15" font-weight="bold" fill="#085041" text-anchor="middle">Leaf2</text>
    <text x="620" y="570" font-size="11" fill="#0F6E56" text-anchor="middle">Lo0 10.255.255.22/32</text>
  </g>
  <g>
    <rect x="970" y="524" width="160" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
    <text x="1050" y="550" font-size="15" font-weight="bold" fill="#085041" text-anchor="middle">Leaf3</text>
    <text x="1050" y="570" font-size="11" fill="#0F6E56" text-anchor="middle">Lo0 10.255.255.23/32</text>
  </g>

  <!-- MLAG grouping bracket -->
  <rect x="150" y="508" width="570" height="92" rx="12" fill="none" stroke="#D85A30" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="160" y="524" font-size="10.5" fill="#993C1D">MLAG pair - domain ekou_test</text>

  <!-- Hosts (gray) -->
  <g>
    <rect x="1170" y="47" width="140" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.1"/>
    <text x="1240" y="70" font-size="13" font-weight="bold" fill="#444441" text-anchor="middle">Test_Server</text>
    <text x="1240" y="88" font-size="10.5" fill="#5F5E5A" text-anchor="middle">via Border Et1</text>
  </g>
  <g>
    <rect x="95" y="800" width="140" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.1"/>
    <text x="165" y="823" font-size="13" font-weight="bold" fill="#444441" text-anchor="middle">VPC1</text>
    <text x="165" y="841" font-size="10.5" fill="#5F5E5A" text-anchor="middle">vlan10 - 192.168.10.0/24</text>
  </g>
  <g>
    <rect x="360" y="800" width="140" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.1"/>
    <text x="430" y="823" font-size="13" font-weight="bold" fill="#444441" text-anchor="middle">Switch</text>
    <text x="430" y="841" font-size="10.5" fill="#5F5E5A" text-anchor="middle">MLAG-attached - vlan20</text>
  </g>
  <g>
    <rect x="905" y="800" width="140" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.1"/>
    <text x="975" y="823" font-size="13" font-weight="bold" fill="#444441" text-anchor="middle">VPC2</text>
    <text x="975" y="841" font-size="10.5" fill="#5F5E5A" text-anchor="middle">vlan20 - 192.168.20.0/24</text>
  </g>
  <g>
    <rect x="1085" y="800" width="140" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.1"/>
    <text x="1155" y="823" font-size="13" font-weight="bold" fill="#444441" text-anchor="middle">VPC3</text>
    <text x="1155" y="841" font-size="10.5" fill="#5F5E5A" text-anchor="middle">vlan30 - 192.168.30.0/24</text>
  </g>

  <!-- ================= REFERENCE BAND ================= -->
  <rect x="40" y="888" width="1360" height="128" rx="10" fill="#F8F7F3" stroke="#D3D1C7" stroke-width="1"/>

  <!-- Left: tenant table -->
  <text x="62" y="912" font-size="13" font-weight="bold" fill="#2C2C2A">Overlay / tenant (distributed anycast gateway)</text>
  <g font-size="11.5" fill="#444441">
    <text x="62" y="936" font-weight="bold">VLAN</text>
    <text x="140" y="936" font-weight="bold">VNI</text>
    <text x="230" y="936" font-weight="bold">Anycast SVI</text>
    <text x="410" y="936" font-weight="bold">Mcast group</text>
    <text x="62" y="958">10</text>   <text x="140" y="958">1010</text> <text x="230" y="958">192.168.10.1/24</text> <text x="410" y="958">239.1.1.10</text>
    <text x="62" y="978">20</text>   <text x="140" y="978">1020</text> <text x="230" y="978">192.168.20.1/24</text> <text x="410" y="978">239.1.1.20</text>
    <text x="62" y="998">30</text>   <text x="140" y="998">1030</text> <text x="230" y="998">192.168.30.1/24</text> <text x="410" y="998">239.1.1.30</text>
  </g>
  <text x="530" y="958" font-size="11" fill="#5F5E5A">Anycast GW MAC</text>
  <text x="530" y="976" font-size="11" fill="#5F5E5A" font-weight="bold">00:1c:73:00:00:01</text>

  <!-- Divider -->
  <line x1="740" y1="900" x2="740" y2="1004" stroke="#D3D1C7" stroke-width="1"/>

  <!-- Right: notes + legend -->
  <text x="762" y="912" font-size="13" font-weight="bold" fill="#2C2C2A">Underlay &amp; conventions</text>
  <g font-size="11.5" fill="#444441">
    <text x="762" y="934">- OSPF area 0; all loopbacks /32, all P2P links /31</text>
    <text x="762" y="953">- /31 convention: spine = .0, leaf/border = .1</text>
    <text x="762" y="972">- PIM-SM on every P2P link; RP = Border Lo0 10.255.255.1</text>
    <text x="762" y="991">- BUM: multicast configured; HER verified working in vEOS-lab</text>
  </g>

  <!-- Legend chips -->
  <g font-size="11" fill="#444441">
    <rect x="1120" y="926" width="14" height="14" rx="3" fill="#E6F1FB" stroke="#185FA5"/><text x="1140" y="937">Spine</text>
    <rect x="1120" y="948" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#0F6E56"/><text x="1140" y="959">Leaf (VTEP)</text>
    <rect x="1250" y="926" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#534AB7"/><text x="1270" y="937">Border / RP</text>
    <rect x="1250" y="948" width="14" height="14" rx="3" fill="#F1EFE8" stroke="#5F5E5A"/><text x="1270" y="959">Host</text>
  </g>
</svg>
