<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" font-family="'Segoe UI',Helvetica,Arial,sans-serif" role="img" aria-label="The hybrid trigger architecture. A software slow path (feed decode, book build, signals and pricing) continuously pre-arms an FPGA fast path with trigger conditions and order templates. The FPGA watches the same market-data feed, matches a trigger, applies an inline risk check, and fires the order to the exchange with the CPU off the critical path.">
  <defs>
    <marker id="ht-f" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#555"/></marker>
    <marker id="ht-feed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6a5aa8"/></marker>
    <marker id="ht-arm" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#c9721f"/></marker>
    <marker id="ht-out" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#e8720c"/></marker>
  </defs>
  <rect x="0" y="0" width="1000" height="460" rx="10" fill="#ffffff"/>

  <!-- market data feed -->
  <rect x="25" y="205" width="98" height="52" rx="6" fill="#eae7f2" stroke="#6a5aa8"/>
  <text x="74" y="227" text-anchor="middle" font-size="12.5" fill="#312a5c">Market</text>
  <text x="74" y="245" text-anchor="middle" font-size="12.5" fill="#312a5c">data feed</text>
  <g stroke="#6a5aa8" stroke-width="2" fill="none" marker-end="url(#ht-feed)">
    <path d="M123,220 L176,138"/>
    <path d="M123,242 L176,352"/>
  </g>
  <text x="140" y="200" font-size="10.5" font-style="italic" fill="#8a7fb5">tapped to both</text>

  <!-- slow path band -->
  <rect x="155" y="50" width="820" height="152" rx="10" fill="#eef4fb" stroke="#b9d3ef"/>
  <text x="172" y="74" font-size="13.5" font-weight="700" fill="#1f4e82">Slow path — software (CPU)</text>
  <text x="172" y="92" font-size="11.5" fill="#5a7fae">µs–ms budget · runs the full model</text>
  <g fill="#fff" stroke="#3a78c2"><rect x="180" y="108" width="150" height="52" rx="5"/><rect x="355" y="108" width="120" height="52" rx="5"/><rect x="500" y="108" width="150" height="52" rx="5"/></g>
  <rect x="675" y="108" width="280" height="52" rx="5" fill="#cfe0f5" stroke="#3a78c2"/>
  <g font-size="12.5" fill="#1a1a1a" text-anchor="middle">
    <text x="255" y="129">Feed decode /</text><text x="255" y="147">normalize</text>
    <text x="415" y="139">Book build</text>
    <text x="575" y="129">Signals +</text><text x="575" y="147">pricing</text>
    <text x="815" y="129" font-weight="600">Arm triggers +</text><text x="815" y="147" font-weight="600">order templates</text>
  </g>
  <g stroke="#555" stroke-width="2" fill="none" marker-end="url(#ht-f)">
    <path d="M330,134 L351,134"/><path d="M475,134 L496,134"/><path d="M650,134 L671,134"/>
  </g>

  <!-- fast path band -->
  <rect x="155" y="270" width="820" height="152" rx="10" fill="#fdf3e5" stroke="#f2d3a6"/>
  <text x="172" y="294" font-size="13.5" font-weight="700" fill="#9a4a06">Fast path — FPGA / smart NIC</text>
  <text x="172" y="312" font-size="11.5" fill="#b3762f">ns budget · CPU off the critical path</text>
  <g fill="#fff" stroke="#e8720c"><rect x="180" y="330" width="170" height="52" rx="5"/><rect x="720" y="330" width="150" height="52" rx="5"/></g>
  <rect x="390" y="330" width="290" height="52" rx="5" fill="#f6d9b0" stroke="#e8720c"/>
  <g font-size="12.5" fill="#1a1a1a" text-anchor="middle">
    <text x="265" y="351">Trigger match</text><text x="265" y="369" font-size="11" fill="#666">watch the stream</text>
    <text x="535" y="351">Order template +</text><text x="535" y="369">inline risk (15c3-5)</text>
    <text x="795" y="360" font-weight="600">Fire order</text>
  </g>
  <g stroke="#555" stroke-width="2" fill="none" marker-end="url(#ht-f)">
    <path d="M350,356 L388,356"/><path d="M680,356 L718,356"/>
  </g>

  <!-- pre-arm arrow -->
  <path d="M812,162 C720,225 660,275 566,328" stroke="#c9721f" stroke-width="2.5" stroke-dasharray="7 5" fill="none" marker-end="url(#ht-arm)"/>
  <text x="700" y="242" font-size="11.5" font-weight="600" fill="#c9721f">pre-arm:</text>
  <text x="700" y="258" font-size="11.5" fill="#c9721f">conditions + templates</text>

  <!-- order out -->
  <path d="M870,356 L958,356" stroke="#e8720c" stroke-width="2.5" fill="none" marker-end="url(#ht-out)"/>
  <text x="912" y="346" text-anchor="middle" font-size="11" fill="#b3762f">to exchange</text>
</svg>
