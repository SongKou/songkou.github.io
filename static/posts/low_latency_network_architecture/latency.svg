    <text x="149" y="470">463</text>
    <text x="227" y="470">460</text>
    <text x="306" y="472">404</text>
    <text x="384" y="470">468</text>
    <text x="462" y="466">639</text>
    <text x="540" y="463">735</text>
    <text x="618" y="468">550</text>
    <text x="697" y="453">1,122</text>
