    <text x="98" y="137">14,000</text>
    <text x="98" y="188">12,000</text>
    <text x="98" y="240">10,000</text>
    <text x="98" y="291">8,000</text>
    <text x="98" y="342">6,000</text>
    <text x="98" y="393">4,000</text>
