<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="'Segoe UI',Helvetica,Arial,sans-serif" role="img" aria-label="Bar chart of order-acknowledgement latency by US venue in microseconds: BATS 463, BATY 460, EDGA 404, EDGX 468, BX 639, NSDQ 735, PSX 550, ARCA 1122, NYSE 1366, CHX 15330, IEX 1232.">
  <rect x="0" y="0" width="1000" height="560" rx="10" fill="#ffffff"/>
