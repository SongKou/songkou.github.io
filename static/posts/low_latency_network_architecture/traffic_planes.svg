<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" font-family="'Segoe UI',Helvetica,Arial,sans-serif" role="img" aria-label="The trading LAN as four physically separate planes: a one-to-many market-data plane (L1 replication, bufferless, 4-6 ns), a many-to-one order-entry plane (FPGA mux, bounded incast, 39 ns), an out-of-band timing plane (GNSS grandmaster to PTP/PPS tree to clocks), and a passive capture plane (optical taps to aggregation and lossless capture).">
  <defs>
    <marker id="tp-md" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#3a78c2"/></marker>
    <marker id="tp-oe" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e8720c"/></marker>
    <marker id="tp-tm" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2e9e5f"/></marker>
    <marker id="tp-cp" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6a5aa8"/></marker>
  </defs>
  <rect x="0" y="0" width="1000" height="680" rx="10" fill="#ffffff"/>

  <!-- Lane 1: Market data -->
  <rect x="20" y="20" width="960" height="145" rx="10" fill="#eef4fb" stroke="#cfe0f5"/>
  <rect x="24" y="24" width="164" height="137" rx="7" fill="#cfe0f5"/>
  <text x="106" y="72" text-anchor="middle" font-size="15" font-weight="700" fill="#1f4e82">Market data</text>
  <text x="106" y="91" text-anchor="middle" font-size="15" font-weight="700" fill="#1f4e82">plane</text>
  <text x="106" y="114" text-anchor="middle" font-size="12" font-style="italic" fill="#2c5f9e">one-to-many</text>
  <text x="106" y="134" text-anchor="middle" font-size="11" fill="#2c5f9e">bufferless · 4–6 ns</text>
  <rect x="210" y="72" width="120" height="40" rx="5" fill="#fff" stroke="#3a78c2"/>
  <text x="270" y="97" text-anchor="middle" font-size="13" fill="#1a1a1a">Exchange feed</text>
  <path d="M330,92 L356,92" stroke="#3a78c2" stroke-width="2" marker-end="url(#tp-md)"/>
  <rect x="360" y="66" width="118" height="52" rx="5" fill="#bbd5f0" stroke="#3a78c2"/>
  <text x="419" y="96" text-anchor="middle" font-size="13" fill="#123">L1 replication</text>
  <g stroke="#3a78c2" stroke-width="2" fill="none" marker-end="url(#tp-md)">
    <path d="M478,92 L696,44"/><path d="M478,92 L696,93"/><path d="M478,92 L696,142"/>
  </g>
  <g fill="#fff" stroke="#888"><rect x="700" y="30" width="95" height="28" rx="4"/><rect x="700" y="79" width="95" height="28" rx="4"/><rect x="700" y="128" width="95" height="28" rx="4"/></g>
  <g font-size="12" fill="#333" text-anchor="middle"><text x="747" y="49">Server</text><text x="747" y="98">Server</text><text x="747" y="147">Server</text></g>

  <!-- Lane 2: Order entry -->
  <rect x="20" y="185" width="960" height="145" rx="10" fill="#fdf3e8" stroke="#f8dcbd"/>
  <rect x="24" y="189" width="164" height="137" rx="7" fill="#f8dcbd"/>
  <text x="106" y="237" text-anchor="middle" font-size="15" font-weight="700" fill="#9a4a06">Order-entry</text>
  <text x="106" y="256" text-anchor="middle" font-size="15" font-weight="700" fill="#9a4a06">plane</text>
  <text x="106" y="279" text-anchor="middle" font-size="12" font-style="italic" fill="#b35a0c">many-to-one</text>
  <text x="106" y="299" text-anchor="middle" font-size="11" fill="#b35a0c">bounded incast · 39 ns</text>
  <g fill="#fff" stroke="#888"><rect x="210" y="195" width="95" height="28" rx="4"/><rect x="210" y="244" width="95" height="28" rx="4"/><rect x="210" y="293" width="95" height="28" rx="4"/></g>
  <g font-size="12" fill="#333" text-anchor="middle"><text x="257" y="214">Server</text><text x="257" y="263">Server</text><text x="257" y="312">Server</text></g>
  <g stroke="#e8720c" stroke-width="2" fill="none" marker-end="url(#tp-oe)">
    <path d="M305,209 L356,255"/><path d="M305,258 L356,257"/><path d="M305,307 L356,259"/>
  </g>
  <rect x="360" y="231" width="118" height="52" rx="5" fill="#f6c98a" stroke="#e8720c"/>
  <text x="419" y="261" text-anchor="middle" font-size="13" fill="#5a2c00">FPGA mux</text>
  <path d="M478,257 L658,257" stroke="#e8720c" stroke-width="2" marker-end="url(#tp-oe)"/>
  <rect x="662" y="235" width="160" height="44" rx="5" fill="#fff" stroke="#e8720c"/>
  <text x="742" y="261" text-anchor="middle" font-size="13" fill="#1a1a1a">Exchange gateway</text>

  <!-- Lane 3: Timing -->
  <rect x="20" y="350" width="960" height="145" rx="10" fill="#eef6ec" stroke="#d3ecd0"/>
  <rect x="24" y="354" width="164" height="137" rx="7" fill="#d3ecd0"/>
  <text x="106" y="402" text-anchor="middle" font-size="15" font-weight="700" fill="#1f6b3a">Timing</text>
  <text x="106" y="421" text-anchor="middle" font-size="15" font-weight="700" fill="#1f6b3a">plane</text>
  <text x="106" y="444" text-anchor="middle" font-size="12" font-style="italic" fill="#2e8a4e">out-of-band</text>
  <text x="106" y="464" text-anchor="middle" font-size="11" fill="#2e8a4e">sub-ns · attribution</text>
  <rect x="210" y="400" width="150" height="44" rx="5" fill="#fff" stroke="#2e9e5f"/>
  <text x="285" y="426" text-anchor="middle" font-size="12.5" fill="#1a1a1a">GNSS grandmaster</text>
  <path d="M360,422 L398,422" stroke="#2e9e5f" stroke-width="2" marker-end="url(#tp-tm)"/>
  <rect x="402" y="396" width="150" height="52" rx="5" fill="#cfe9c8" stroke="#2e9e5f"/>
  <text x="477" y="426" text-anchor="middle" font-size="13" fill="#123">PTP / PPS tree</text>
  <path d="M552,422 L638,422" stroke="#2e9e5f" stroke-width="2" marker-end="url(#tp-tm)"/>
  <rect x="642" y="400" width="210" height="44" rx="5" fill="#fff" stroke="#2e9e5f"/>
  <text x="747" y="426" text-anchor="middle" font-size="12.5" fill="#1a1a1a">Clocks in NIC / switch / tap</text>

  <!-- Lane 4: Capture -->
  <rect x="20" y="515" width="960" height="145" rx="10" fill="#f2f0f8" stroke="#ddd6ef"/>
  <rect x="24" y="519" width="164" height="137" rx="7" fill="#ddd6ef"/>
  <text x="106" y="567" text-anchor="middle" font-size="15" font-weight="700" fill="#4a3d86">Capture</text>
  <text x="106" y="586" text-anchor="middle" font-size="15" font-weight="700" fill="#4a3d86">plane</text>
  <text x="106" y="609" text-anchor="middle" font-size="12" font-style="italic" fill="#5f4fa0">passive</text>
  <text x="106" y="629" text-anchor="middle" font-size="11" fill="#5f4fa0">deep buffers</text>
  <rect x="210" y="565" width="130" height="44" rx="5" fill="#fff" stroke="#6a5aa8"/>
  <text x="275" y="591" text-anchor="middle" font-size="13" fill="#1a1a1a">Optical taps</text>
  <path d="M340,587 L378,587" stroke="#6a5aa8" stroke-width="2" marker-end="url(#tp-cp)"/>
  <rect x="382" y="561" width="190" height="52" rx="5" fill="#ddd6ef" stroke="#6a5aa8"/>
  <text x="477" y="591" text-anchor="middle" font-size="12.5" fill="#312a5c">Aggregate + timestamp</text>
  <path d="M572,587 L618,587" stroke="#6a5aa8" stroke-width="2" marker-end="url(#tp-cp)"/>
  <rect x="622" y="565" width="180" height="44" rx="5" fill="#fff" stroke="#6a5aa8"/>
  <text x="712" y="591" text-anchor="middle" font-size="13" fill="#1a1a1a">Lossless capture</text>
</svg>
