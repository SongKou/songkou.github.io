<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="990" viewBox="0 0 1280 990" font-family="Inter,Segoe UI,Arial,sans-serif">
  <rect width="1280" height="990" fill="#07111f"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto"><path d="M0,0 L0,8 L10,4 z" fill="#49627e"/></marker>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity=".25"/></filter>
  </defs>

  <text x="64" y="64" font-size="34" font-weight="750" fill="#e5eef9">RDMA Tuning Path</text>
  <text x="64" y="98" font-size="18" font-weight="450" fill="#9fb0c5">Seven checks &#8594; one tuning script &#8594; fault-isolation table &#183; ConnectX-5/6/7 &#183; MLNX_OFED &#183; RoCEv2 / InfiniBand</text>

  <!-- Hardware layer -->
  <g filter="url(#shadow)">
    <rect x="64" y="130" width="1152" height="150" rx="14" fill="#0f2036"/>
    <rect x="64" y="130" width="6" height="150" rx="3" fill="#38bdf8"/>
    <text x="92" y="198" font-size="17" font-weight="750" fill="#38bdf8">HARDWARE</text>
    <text x="92" y="220" font-size="13" font-weight="500" fill="#9fb0c5">physical layer</text>

    <rect x="250" y="160" width="330" height="90" rx="12" fill="#152944" stroke="#38bdf8" stroke-width="2"/>
    <circle cx="286" cy="205" r="17" fill="#38bdf8"/>
    <text x="286" y="210" text-anchor="middle" font-size="14" font-weight="750" fill="#07111f">01</text>
    <text x="316" y="200" font-size="20" font-weight="650" fill="#e5eef9">Confirm hardware</text>
    <text x="316" y="226" font-size="14" font-weight="450" fill="#9fb0c5">PCIe link &#183; NUMA &#183; queue count</text>
    <line x1="592" y1="205" x2="630" y2="205" stroke="#49627e" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
    <rect x="644" y="160" width="330" height="90" rx="12" fill="#152944" stroke="#38bdf8" stroke-width="2"/>
    <circle cx="680" cy="205" r="17" fill="#38bdf8"/>
    <text x="680" y="210" text-anchor="middle" font-size="14" font-weight="750" fill="#07111f">02</text>
    <text x="710" y="200" font-size="20" font-weight="650" fill="#e5eef9">PCIe MaxReadReq</text>
    <text x="710" y="226" font-size="14" font-weight="450" fill="#9fb0c5">default 512 &#8594; set 4096</text>
  </g>
  <line x1="640" y1="284" x2="640" y2="308" stroke="#49627e" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- System layer -->
  <g filter="url(#shadow)">
    <rect x="64" y="320" width="1152" height="150" rx="14" fill="#0f2036"/>
    <rect x="64" y="320" width="6" height="150" rx="3" fill="#a78bfa"/>
    <text x="92" y="388" font-size="17" font-weight="750" fill="#a78bfa">SYSTEM</text>
    <text x="92" y="410" font-size="13" font-weight="500" fill="#9fb0c5">host tuning</text>

    <rect x="250" y="350" width="280" height="90" rx="12" fill="#152944" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="286" cy="395" r="17" fill="#a78bfa"/>
    <text x="286" y="400" text-anchor="middle" font-size="14" font-weight="750" fill="#07111f">03</text>
    <text x="316" y="390" font-size="19" font-weight="650" fill="#e5eef9">CPU &amp; IRQ binding</text>
    <text x="316" y="416" font-size="14" font-weight="450" fill="#9fb0c5">pin IRQs &#183; performance gov</text>
    <line x1="540" y1="395" x2="560" y2="395" stroke="#49627e" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
    <rect x="572" y="350" width="280" height="90" rx="12" fill="#152944" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="608" cy="395" r="17" fill="#a78bfa"/>
    <text x="608" y="400" text-anchor="middle" font-size="14" font-weight="750" fill="#07111f">04</text>
    <text x="638" y="390" font-size="19" font-weight="650" fill="#e5eef9">mlnx_tune</text>
    <text x="638" y="416" font-size="14" font-weight="450" fill="#9fb0c5">one-shot NVIDIA profile</text>
    <line x1="862" y1="395" x2="882" y2="395" stroke="#49627e" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
    <rect x="894" y="350" width="280" height="90" rx="12" fill="#152944" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="930" cy="395" r="17" fill="#a78bfa"/>
    <text x="930" y="400" text-anchor="middle" font-size="14" font-weight="750" fill="#07111f">05</text>
    <text x="960" y="390" font-size="19" font-weight="650" fill="#e5eef9">Queue parallelism</text>
    <text x="960" y="416" font-size="14" font-weight="450" fill="#9fb0c5">QP count &#183; tx_depth</text>
  </g>
  <line x1="640" y1="474" x2="640" y2="498" stroke="#49627e" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- Network layer -->
  <g filter="url(#shadow)">
    <rect x="64" y="510" width="1152" height="150" rx="14" fill="#0f2036"/>
    <rect x="64" y="510" width="6" height="150" rx="3" fill="#34d399"/>
    <text x="92" y="578" font-size="17" font-weight="750" fill="#34d399">NETWORK</text>
    <text x="92" y="600" font-size="13" font-weight="500" fill="#9fb0c5">fabric side</text>

    <rect x="250" y="540" width="330" height="90" rx="12" fill="#152944" stroke="#34d399" stroke-width="2"/>
    <circle cx="286" cy="585" r="17" fill="#34d399"/>
    <text x="286" y="590" text-anchor="middle" font-size="14" font-weight="750" fill="#07111f">06</text>
    <text x="316" y="580" font-size="20" font-weight="650" fill="#e5eef9">MTU</text>
    <text x="316" y="606" font-size="14" font-weight="450" fill="#9fb0c5">end-to-end &#183; jumbo frames</text>
    <line x1="592" y1="585" x2="630" y2="585" stroke="#49627e" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
    <rect x="644" y="540" width="330" height="90" rx="12" fill="#152944" stroke="#34d399" stroke-width="2"/>
    <circle cx="680" cy="585" r="17" fill="#34d399"/>
    <text x="680" y="590" text-anchor="middle" font-size="14" font-weight="750" fill="#07111f">07</text>
    <text x="710" y="580" font-size="20" font-weight="650" fill="#e5eef9">ECN + PFC</text>
    <text x="710" y="606" font-size="14" font-weight="450" fill="#9fb0c5">lossless network validation</text>
  </g>
  <line x1="640" y1="664" x2="640" y2="688" stroke="#49627e" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- Delivery -->
  <g filter="url(#shadow)">
    <rect x="64" y="700" width="1152" height="140" rx="14" fill="#0f2036"/>
    <rect x="64" y="700" width="6" height="140" rx="3" fill="#fbbf24"/>
    <text x="92" y="763" font-size="17" font-weight="750" fill="#fbbf24">DELIVERY</text>
    <text x="92" y="785" font-size="13" font-weight="500" fill="#9fb0c5">keep &amp; reuse</text>

    <rect x="250" y="726" width="330" height="88" rx="12" fill="#152944" stroke="#fbbf24" stroke-width="2"/>
    <text x="286" y="765" font-size="20" font-weight="650" fill="#e5eef9">Tuning script</text>
    <text x="286" y="791" font-size="14" font-weight="450" fill="#9fb0c5">run on every new machine</text>
    <line x1="592" y1="770" x2="630" y2="770" stroke="#49627e" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
    <rect x="644" y="726" width="330" height="88" rx="12" fill="#152944" stroke="#fbbf24" stroke-width="2"/>
    <text x="680" y="765" font-size="20" font-weight="650" fill="#e5eef9">Fault-isolation table</text>
    <text x="680" y="791" font-size="14" font-weight="450" fill="#9fb0c5">symptom &#8594; check &#8594; fix</text>
  </g>
  <line x1="640" y1="844" x2="640" y2="864" stroke="#49627e" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="450" y="872" width="380" height="54" rx="27" fill="#0f2b22" stroke="#34d399" stroke-width="2.5"/>
  <text x="640" y="906" text-anchor="middle" font-size="19" font-weight="650" fill="#34d399">Bandwidth at line rate &#183; 95+ Gbps</text>

  <text x="1216" y="965" text-anchor="end" font-size="15" font-weight="500" fill="#9fb0c5">RDMA Performance Tuning</text>
</svg>
