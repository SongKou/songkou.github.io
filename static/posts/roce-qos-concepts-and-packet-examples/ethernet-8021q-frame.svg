<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="580" viewBox="0 0 1280 580" font-family="Inter,Segoe UI,Arial,sans-serif">
  <rect width="1280" height="580" fill="#07111f"/>
  <defs><filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity=".25"/></filter></defs>

  <text x="64" y="60" font-size="30" font-weight="750" fill="#e5eef9">Ethernet frame with 802.1Q VLAN tag</text>
  <text x="64" y="92" font-size="16" font-weight="450" fill="#9fb0c5">The 4-byte tag sits between the source MAC and the original EtherType &#8212; and carries the PCP/CoS bits</text>

  <g filter="url(#shadow)">
    <rect x="64" y="150" width="200" height="80" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="164" y="185" text-anchor="middle" font-size="17" font-weight="650" fill="#e5eef9">Destination MAC</text>
    <text x="164" y="211" text-anchor="middle" font-size="13" fill="#9fb0c5">6 bytes</text>

    <rect x="264" y="150" width="200" height="80" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="364" y="185" text-anchor="middle" font-size="17" font-weight="650" fill="#e5eef9">Source MAC</text>
    <text x="364" y="211" text-anchor="middle" font-size="13" fill="#9fb0c5">6 bytes</text>

    <rect x="464" y="150" width="150" height="80" fill="#0f2b22" stroke="#34d399" stroke-width="2.5"/>
    <text x="539" y="185" text-anchor="middle" font-size="17" font-weight="650" fill="#34d399">802.1Q tag</text>
    <text x="539" y="211" text-anchor="middle" font-size="13" fill="#9fb0c5">4 bytes &#183; optional</text>

    <rect x="614" y="150" width="140" height="80" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="684" y="185" text-anchor="middle" font-size="17" font-weight="650" fill="#e5eef9">EtherType</text>
    <text x="684" y="211" text-anchor="middle" font-size="13" fill="#9fb0c5">2 bytes</text>

    <rect x="754" y="150" width="342" height="80" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="925" y="185" text-anchor="middle" font-size="17" font-weight="650" fill="#e5eef9">Payload</text>
    <text x="925" y="211" text-anchor="middle" font-size="13" fill="#9fb0c5">46&#8211;1500 bytes</text>

    <rect x="1096" y="150" width="120" height="80" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="1156" y="185" text-anchor="middle" font-size="17" font-weight="650" fill="#e5eef9">FCS</text>
    <text x="1156" y="211" text-anchor="middle" font-size="13" fill="#9fb0c5">4 bytes</text>
  </g>

  <line x1="464" y1="232" x2="64" y2="326" stroke="#34d399" stroke-width="1.5" stroke-dasharray="6 6"/>
  <line x1="614" y1="232" x2="1216" y2="326" stroke="#34d399" stroke-width="1.5" stroke-dasharray="6 6"/>

  <g filter="url(#shadow)">
    <rect x="64" y="330" width="576" height="80" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="352" y="365" text-anchor="middle" font-size="17" font-weight="650" fill="#e5eef9">TPID = 0x8100</text>
    <text x="352" y="391" text-anchor="middle" font-size="13" fill="#9fb0c5">16 bits &#183; "a VLAN tag follows"</text>

    <rect x="640" y="330" width="108" height="80" fill="#0f2b22" stroke="#34d399" stroke-width="2.5"/>
    <text x="694" y="365" text-anchor="middle" font-size="17" font-weight="650" fill="#34d399">PCP</text>
    <text x="694" y="391" text-anchor="middle" font-size="13" fill="#9fb0c5">3 bits</text>

    <rect x="748" y="330" width="36" height="80" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="766" y="365" text-anchor="middle" font-size="13" font-weight="650" fill="#e5eef9">DEI</text>
    <text x="766" y="391" text-anchor="middle" font-size="11" fill="#9fb0c5">1</text>

    <rect x="784" y="330" width="432" height="80" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="1000" y="365" text-anchor="middle" font-size="17" font-weight="650" fill="#e5eef9">VID</text>
    <text x="1000" y="391" text-anchor="middle" font-size="13" fill="#9fb0c5">12 bits &#183; VLAN 1&#8211;4094</text>
  </g>

  <text x="64" y="466" font-size="15" fill="#9fb0c5">PCP (Priority Code Point) is the CoS / 802.1p value: 3 bits, 8 priorities &#8212; the reason PFC has exactly 8 priorities.</text>
  <text x="64" y="492" font-size="15" fill="#9fb0c5">An untagged frame has no PCP field at all: on routed server ports there is nothing for "trust pcp" to read.</text>

  <text x="1216" y="548" text-anchor="end" font-size="14" font-weight="500" fill="#9fb0c5">RoCE QoS Concepts</text>
</svg>
