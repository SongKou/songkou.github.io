<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="660" viewBox="0 0 1280 660" font-family="Inter,Segoe UI,Arial,sans-serif">
  <rect width="1280" height="660" fill="#07111f"/>
  <defs><filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity=".25"/></filter></defs>

  <text x="64" y="60" font-size="30" font-weight="750" fill="#e5eef9">IPv4 header</text>
  <text x="64" y="92" font-size="16" font-weight="450" fill="#9fb0c5">20 bytes without options &#183; DSCP + ECN form the second byte (the DS / historical ToS byte)</text>

  <!-- bit ruler -->
  <g font-size="12" fill="#9fb0c5" text-anchor="middle">
    <text x="82" y="140">0</text><text x="226" y="140">4</text><text x="370" y="140">8</text><text x="514" y="140">12</text><text x="658" y="140">16</text><text x="802" y="140">20</text><text x="946" y="140">24</text><text x="1090" y="140">28</text><text x="1198" y="140">31</text>
  </g>

  <g filter="url(#shadow)" font-size="16" font-weight="650">
    <!-- row 1 -->
    <rect x="64" y="150" width="144" height="64" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="136" y="178" text-anchor="middle" fill="#e5eef9">Version</text>
    <text x="136" y="200" text-anchor="middle" font-size="12" font-weight="450" fill="#9fb0c5">4 bits</text>
    <rect x="208" y="150" width="144" height="64" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="280" y="178" text-anchor="middle" fill="#e5eef9">IHL</text>
    <text x="280" y="200" text-anchor="middle" font-size="12" font-weight="450" fill="#9fb0c5">4 bits</text>
    <rect x="352" y="150" width="216" height="64" fill="#0f2b22" stroke="#34d399" stroke-width="2.5"/>
    <text x="460" y="178" text-anchor="middle" fill="#34d399">DSCP</text>
    <text x="460" y="200" text-anchor="middle" font-size="12" font-weight="450" fill="#9fb0c5">6 bits</text>
    <rect x="568" y="150" width="72" height="64" fill="#2b230f" stroke="#fbbf24" stroke-width="2.5"/>
    <text x="604" y="178" text-anchor="middle" fill="#fbbf24">ECN</text>
    <text x="604" y="200" text-anchor="middle" font-size="12" font-weight="450" fill="#9fb0c5">2 bits</text>
    <rect x="640" y="150" width="576" height="64" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="928" y="178" text-anchor="middle" fill="#e5eef9">Total Length</text>
    <text x="928" y="200" text-anchor="middle" font-size="12" font-weight="450" fill="#9fb0c5">16 bits &#183; header + payload</text>

    <!-- row 2 -->
    <rect x="64" y="214" width="576" height="64" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="352" y="242" text-anchor="middle" fill="#e5eef9">Identification</text>
    <text x="352" y="264" text-anchor="middle" font-size="12" font-weight="450" fill="#9fb0c5">16 bits</text>
    <rect x="640" y="214" width="108" height="64" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="694" y="242" text-anchor="middle" fill="#e5eef9">Flags</text>
    <text x="694" y="264" text-anchor="middle" font-size="12" font-weight="450" fill="#9fb0c5">3 &#183; incl. DF</text>
    <rect x="748" y="214" width="468" height="64" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="982" y="242" text-anchor="middle" fill="#e5eef9">Fragment Offset</text>
    <text x="982" y="264" text-anchor="middle" font-size="12" font-weight="450" fill="#9fb0c5">13 bits</text>

    <!-- row 3 -->
    <rect x="64" y="278" width="288" height="64" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="208" y="306" text-anchor="middle" fill="#e5eef9">TTL</text>
    <text x="208" y="328" text-anchor="middle" font-size="12" font-weight="450" fill="#9fb0c5">8 bits</text>
    <rect x="352" y="278" width="288" height="64" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="496" y="306" text-anchor="middle" fill="#e5eef9">Protocol</text>
    <text x="496" y="328" text-anchor="middle" font-size="12" font-weight="450" fill="#9fb0c5">8 bits &#183; 6 TCP &#183; 17 UDP</text>
    <rect x="640" y="278" width="576" height="64" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="928" y="306" text-anchor="middle" fill="#e5eef9">Header Checksum</text>
    <text x="928" y="328" text-anchor="middle" font-size="12" font-weight="450" fill="#9fb0c5">16 bits &#183; header only</text>

    <!-- rows 4-5 -->
    <rect x="64" y="342" width="1152" height="64" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="640" y="370" text-anchor="middle" fill="#e5eef9">Source Address</text>
    <text x="640" y="392" text-anchor="middle" font-size="12" font-weight="450" fill="#9fb0c5">32 bits</text>
    <rect x="64" y="406" width="1152" height="64" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="640" y="434" text-anchor="middle" fill="#e5eef9">Destination Address</text>
    <text x="640" y="456" text-anchor="middle" font-size="12" font-weight="450" fill="#9fb0c5">32 bits</text>

    <!-- row 6 -->
    <rect x="64" y="470" width="1152" height="64" fill="#0d1b2e" stroke="#49627e" stroke-width="2" stroke-dasharray="8 6"/>
    <text x="640" y="498" text-anchor="middle" fill="#9fb0c5">Options</text>
    <text x="640" y="520" text-anchor="middle" font-size="12" font-weight="450" fill="#9fb0c5">only if IHL &#62; 5 &#183; rare</text>
  </g>

  <rect x="64" y="566" width="14" height="14" fill="#0f2b22" stroke="#34d399" stroke-width="2"/>
  <text x="88" y="578" font-size="14" fill="#9fb0c5">DSCP &#8212; the QoS classification marking</text>
  <rect x="420" y="566" width="14" height="14" fill="#2b230f" stroke="#fbbf24" stroke-width="2"/>
  <text x="444" y="578" font-size="14" fill="#9fb0c5">ECN &#8212; rewritten ECT &#8594; CE by a congested switch (checksum updated too)</text>

  <text x="1216" y="628" text-anchor="end" font-size="14" font-weight="500" fill="#9fb0c5">RoCE QoS Concepts</text>
</svg>
