<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="660" viewBox="0 0 1280 660" font-family="Inter,Segoe UI,Arial,sans-serif">
  <rect width="1280" height="660" fill="#07111f"/>
  <defs><filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity=".25"/></filter></defs>

  <text x="64" y="60" font-size="30" font-weight="750" fill="#e5eef9">TCP header</text>
  <text x="64" y="92" font-size="16" font-weight="450" fill="#9fb0c5">20&#8211;60 bytes &#183; ECE and CWR are TCP's in-band counterpart of the RoCEv2 CNP</text>

  <g font-size="12" fill="#9fb0c5" text-anchor="middle">
    <text x="82" y="140">0</text><text x="226" y="140">4</text><text x="370" y="140">8</text><text x="514" y="140">12</text><text x="658" y="140">16</text><text x="802" y="140">20</text><text x="946" y="140">24</text><text x="1090" y="140">28</text><text x="1198" y="140">31</text>
  </g>

  <g filter="url(#shadow)" font-size="16" font-weight="650">
    <!-- row 1 -->
    <rect x="64" y="150" width="576" height="64" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="352" y="178" text-anchor="middle" fill="#e5eef9">Source Port</text>
    <text x="352" y="200" text-anchor="middle" font-size="12" font-weight="450" fill="#9fb0c5">16 bits</text>
    <rect x="640" y="150" width="576" height="64" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="928" y="178" text-anchor="middle" fill="#e5eef9">Destination Port</text>
    <text x="928" y="200" text-anchor="middle" font-size="12" font-weight="450" fill="#9fb0c5">16 bits</text>

    <!-- rows 2-3 -->
    <rect x="64" y="214" width="1152" height="64" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="640" y="242" text-anchor="middle" fill="#e5eef9">Sequence Number</text>
    <text x="640" y="264" text-anchor="middle" font-size="12" font-weight="450" fill="#9fb0c5">32 bits &#183; position in the byte stream</text>
    <rect x="64" y="278" width="1152" height="64" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="640" y="306" text-anchor="middle" fill="#e5eef9">Acknowledgment Number</text>
    <text x="640" y="328" text-anchor="middle" font-size="12" font-weight="450" fill="#9fb0c5">32 bits &#183; next byte expected</text>

    <!-- row 4 -->
    <rect x="64" y="342" width="144" height="64" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="136" y="370" text-anchor="middle" font-size="14" fill="#e5eef9">Data Offset</text>
    <text x="136" y="392" text-anchor="middle" font-size="12" font-weight="450" fill="#9fb0c5">4 bits</text>
    <rect x="208" y="342" width="144" height="64" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="280" y="370" text-anchor="middle" font-size="14" fill="#e5eef9">Reserved</text>
    <text x="280" y="392" text-anchor="middle" font-size="12" font-weight="450" fill="#9fb0c5">4 bits</text>

    <rect x="352" y="342" width="36" height="64" fill="#2b230f" stroke="#fbbf24" stroke-width="2.5"/>
    <text x="370" y="378" text-anchor="middle" font-size="10" fill="#fbbf24">CWR</text>
    <rect x="388" y="342" width="36" height="64" fill="#2b230f" stroke="#fbbf24" stroke-width="2.5"/>
    <text x="406" y="378" text-anchor="middle" font-size="10" fill="#fbbf24">ECE</text>
    <rect x="424" y="342" width="36" height="64" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="442" y="378" text-anchor="middle" font-size="10" fill="#e5eef9">URG</text>
    <rect x="460" y="342" width="36" height="64" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="478" y="378" text-anchor="middle" font-size="10" fill="#e5eef9">ACK</text>
    <rect x="496" y="342" width="36" height="64" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="514" y="378" text-anchor="middle" font-size="10" fill="#e5eef9">PSH</text>
    <rect x="532" y="342" width="36" height="64" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="550" y="378" text-anchor="middle" font-size="10" fill="#e5eef9">RST</text>
    <rect x="568" y="342" width="36" height="64" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="586" y="378" text-anchor="middle" font-size="10" fill="#e5eef9">SYN</text>
    <rect x="604" y="342" width="36" height="64" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="622" y="378" text-anchor="middle" font-size="10" fill="#e5eef9">FIN</text>

    <rect x="640" y="342" width="576" height="64" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="928" y="370" text-anchor="middle" fill="#e5eef9">Window Size</text>
    <text x="928" y="392" text-anchor="middle" font-size="12" font-weight="450" fill="#9fb0c5">16 bits &#183; receiver flow control</text>

    <!-- row 5 -->
    <rect x="64" y="406" width="576" height="64" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="352" y="434" text-anchor="middle" fill="#e5eef9">Checksum</text>
    <text x="352" y="456" text-anchor="middle" font-size="12" font-weight="450" fill="#9fb0c5">16 bits &#183; header + data</text>
    <rect x="640" y="406" width="576" height="64" fill="#152944" stroke="#49627e" stroke-width="2"/>
    <text x="928" y="434" text-anchor="middle" fill="#e5eef9">Urgent Pointer</text>
    <text x="928" y="456" text-anchor="middle" font-size="12" font-weight="450" fill="#9fb0c5">16 bits &#183; valid when URG set</text>

    <!-- row 6 -->
    <rect x="64" y="470" width="1152" height="64" fill="#0d1b2e" stroke="#49627e" stroke-width="2" stroke-dasharray="8 6"/>
    <text x="640" y="498" text-anchor="middle" fill="#9fb0c5">Options / Padding</text>
    <text x="640" y="520" text-anchor="middle" font-size="12" font-weight="450" fill="#9fb0c5">MSS &#183; window scale &#183; SACK &#183; timestamps</text>
  </g>

  <rect x="64" y="566" width="14" height="14" fill="#2b230f" stroke="#fbbf24" stroke-width="2"/>
  <text x="88" y="578" font-size="14" fill="#9fb0c5">ECE = "I saw a CE mark" &#183; CWR = "I reduced my rate" &#8212; same CE trigger as a CNP, different feedback channel</text>

  <text x="1216" y="628" text-anchor="end" font-size="14" font-weight="500" fill="#9fb0c5">RoCE QoS Concepts</text>
</svg>
