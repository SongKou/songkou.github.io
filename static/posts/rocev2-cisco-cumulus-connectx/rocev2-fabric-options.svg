<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1120" viewBox="0 0 1400 1120" role="img" aria-labelledby="title desc">
  <title id="title">Equivalent Cisco Nexus and NVIDIA Spectrum RoCEv2 spine-leaf fabrics</title>
  <desc id="desc">Two panels compare an all-Cisco Nexus fabric and an all-NVIDIA Spectrum fabric. Each has two spine switches, two leaf switches, four full-mesh spine-to-leaf links, and three dual-homed GPU servers with ConnectX adapters.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#101c2d"/>
    </linearGradient>
    <linearGradient id="spineFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#39296e"/>
      <stop offset="1" stop-color="#241b4b"/>
    </linearGradient>
    <linearGradient id="leafFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#064e4a"/>
      <stop offset="1" stop-color="#083b3d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 700 38px Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 19px Arial, sans-serif; fill: #a9b8cc; }
      .panel-title { font: 700 25px Arial, sans-serif; fill: #f8fafc; }
      .panel-note { font: 17px Arial, sans-serif; fill: #9fb0c5; }
      .role { font: 700 16px Arial, sans-serif; fill: #8ea0b6; letter-spacing: 1px; }
      .node-title { font: 700 19px Arial, sans-serif; fill: #ffffff; text-anchor: middle; }
      .node-sub { font: 14px Arial, sans-serif; fill: #cbd5e1; text-anchor: middle; }
      .server-title { font: 700 17px Arial, sans-serif; fill: #dbeafe; text-anchor: middle; }
      .server-sub { font: 13px Arial, sans-serif; fill: #93c5fd; text-anchor: middle; }
      .link-label { font: 700 14px Arial, sans-serif; fill: #c4b5fd; text-anchor: middle; }
      .legend { font: 16px Arial, sans-serif; fill: #cbd5e1; }
      .fabric-link { fill: none; stroke: #a78bfa; stroke-width: 4; stroke-linecap: round; opacity: 0.76; }
      .host-link { fill: none; stroke: #2dd4bf; stroke-width: 4; stroke-linecap: round; opacity: 0.78; }
    </style>
  </defs>

  <rect width="1400" height="1120" rx="30" fill="#07111f"/>
  <text x="700" y="60" class="title" fill="#f8fafc" font-family="Arial, sans-serif" font-size="38" font-weight="700" text-anchor="middle">Two equivalent RoCEv2 fabric options</text>
  <text x="700" y="92" class="subtitle" fill="#a9b8cc" font-family="Arial, sans-serif" font-size="19" text-anchor="middle">The topology and QoS contract stay the same; the configuration interface changes by platform.</text>

  <!-- Panel A -->
  <g transform="translate(55 125)">
    <rect width="1290" height="430" rx="24" fill="#0b1626" stroke="#26364b" stroke-width="2"/>
    <text x="30" y="43" class="panel-title" fill="#f8fafc" font-family="Arial, sans-serif" font-size="25" font-weight="700">A. Cisco Nexus fabric (NX-OS)</text>
    <text x="1260" y="43" class="panel-note" fill="#9fb0c5" font-family="Arial, sans-serif" font-size="17" text-anchor="end">Example: 4 x 400G spine-leaf bundle</text>
    <text x="30" y="125" class="role" fill="#8ea0b6" font-family="Arial, sans-serif" font-size="16" font-weight="700">SPINE</text>
    <text x="30" y="245" class="role" fill="#8ea0b6" font-family="Arial, sans-serif" font-size="16" font-weight="700">LEAF</text>
    <text x="30" y="365" class="role" fill="#8ea0b6" font-family="Arial, sans-serif" font-size="16" font-weight="700">GPU HOSTS</text>

    <!-- Full mesh links -->
    <path d="M390 150 C410 185 430 195 440 220" class="fabric-link" fill="none" stroke="#a78bfa" stroke-width="4" stroke-linecap="round" opacity="0.76"/>
    <path d="M390 150 C560 188 745 188 890 220" class="fabric-link" fill="none" stroke="#a78bfa" stroke-width="4" stroke-linecap="round" opacity="0.76"/>
    <path d="M900 150 C735 188 565 188 440 220" class="fabric-link" fill="none" stroke="#a78bfa" stroke-width="4" stroke-linecap="round" opacity="0.76"/>
    <path d="M900 150 C880 185 870 195 890 220" class="fabric-link" fill="none" stroke="#a78bfa" stroke-width="4" stroke-linecap="round" opacity="0.76"/>
    <rect x="557" y="169" width="176" height="28" rx="14" fill="#1b2740" stroke="#594b8f"/>
    <text x="645" y="188" class="link-label" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">full mesh</text>

    <!-- Host links -->
    <path d="M440 290 C400 320 320 326 290 346" class="host-link" fill="none" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round" opacity="0.78"/>
    <path d="M440 290 C520 320 590 325 645 346" class="host-link" fill="none" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round" opacity="0.78"/>
    <path d="M440 290 C600 320 920 320 1000 346" class="host-link" fill="none" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round" opacity="0.78"/>
    <path d="M890 290 C730 320 370 320 290 346" class="host-link" fill="none" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round" opacity="0.78"/>
    <path d="M890 290 C810 320 700 325 645 346" class="host-link" fill="none" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round" opacity="0.78"/>
    <path d="M890 290 C930 320 970 326 1000 346" class="host-link" fill="none" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round" opacity="0.78"/>

    <!-- Spines -->
    <g>
      <rect x="275" y="82" width="230" height="70" rx="13" fill="#39296e" stroke="#9b87f5" stroke-width="3"/>
      <text x="390" y="111" class="node-title" fill="#ffffff" font-family="Arial, sans-serif" font-size="19" font-weight="700" text-anchor="middle">Cisco Nexus 9508</text>
      <text x="390" y="134" class="node-sub" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Spine-1 / NX-OS</text>
      <rect x="785" y="82" width="230" height="70" rx="13" fill="#39296e" stroke="#9b87f5" stroke-width="3"/>
      <text x="900" y="111" class="node-title" fill="#ffffff" font-family="Arial, sans-serif" font-size="19" font-weight="700" text-anchor="middle">Cisco Nexus 9508</text>
      <text x="900" y="134" class="node-sub" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Spine-2 / NX-OS</text>
    </g>

    <!-- Leaves -->
    <g>
      <rect x="325" y="220" width="230" height="72" rx="13" fill="#064e4a" stroke="#2dd4bf" stroke-width="3"/>
      <text x="440" y="250" class="node-title" fill="#ffffff" font-family="Arial, sans-serif" font-size="19" font-weight="700" text-anchor="middle">Cisco Nexus 93180</text>
      <text x="440" y="274" class="node-sub" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Leaf-1 / NX-OS</text>
      <rect x="775" y="220" width="230" height="72" rx="13" fill="#064e4a" stroke="#2dd4bf" stroke-width="3"/>
      <text x="890" y="250" class="node-title" fill="#ffffff" font-family="Arial, sans-serif" font-size="19" font-weight="700" text-anchor="middle">Cisco Nexus 93180</text>
      <text x="890" y="274" class="node-sub" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Leaf-2 / NX-OS</text>
    </g>

    <!-- Servers -->
    <g>
      <rect x="195" y="346" width="190" height="64" rx="12" fill="#10233d" stroke="#60a5fa" stroke-width="2"/>
      <text x="290" y="373" class="server-title" fill="#dbeafe" font-family="Arial, sans-serif" font-size="17" font-weight="700" text-anchor="middle">GPU node A</text><text x="290" y="396" class="server-sub" fill="#93c5fd" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">ConnectX-6/7</text>
      <rect x="550" y="346" width="190" height="64" rx="12" fill="#10233d" stroke="#60a5fa" stroke-width="2"/>
      <text x="645" y="373" class="server-title" fill="#dbeafe" font-family="Arial, sans-serif" font-size="17" font-weight="700" text-anchor="middle">GPU node B</text><text x="645" y="396" class="server-sub" fill="#93c5fd" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">ConnectX-6/7</text>
      <rect x="905" y="346" width="190" height="64" rx="12" fill="#10233d" stroke="#60a5fa" stroke-width="2"/>
      <text x="1000" y="373" class="server-title" fill="#dbeafe" font-family="Arial, sans-serif" font-size="17" font-weight="700" text-anchor="middle">GPU node C</text><text x="1000" y="396" class="server-sub" fill="#93c5fd" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">ConnectX-6/7</text>
    </g>
  </g>

  <!-- Panel B -->
  <g transform="translate(55 585)">
    <rect width="1290" height="430" rx="24" fill="#0b1626" stroke="#26364b" stroke-width="2"/>
    <text x="30" y="43" class="panel-title" fill="#f8fafc" font-family="Arial, sans-serif" font-size="25" font-weight="700">B. NVIDIA Spectrum fabric (Cumulus Linux)</text>
    <text x="1260" y="43" class="panel-note" fill="#9fb0c5" font-family="Arial, sans-serif" font-size="17" text-anchor="end">Same topology, configured with NVUE</text>
    <text x="30" y="125" class="role" fill="#8ea0b6" font-family="Arial, sans-serif" font-size="16" font-weight="700">SPINE</text>
    <text x="30" y="245" class="role" fill="#8ea0b6" font-family="Arial, sans-serif" font-size="16" font-weight="700">LEAF</text>
    <text x="30" y="365" class="role" fill="#8ea0b6" font-family="Arial, sans-serif" font-size="16" font-weight="700">GPU HOSTS</text>

    <path d="M390 150 C410 185 430 195 440 220" class="fabric-link" fill="none" stroke="#a78bfa" stroke-width="4" stroke-linecap="round" opacity="0.76"/>
    <path d="M390 150 C560 188 745 188 890 220" class="fabric-link" fill="none" stroke="#a78bfa" stroke-width="4" stroke-linecap="round" opacity="0.76"/>
    <path d="M900 150 C735 188 565 188 440 220" class="fabric-link" fill="none" stroke="#a78bfa" stroke-width="4" stroke-linecap="round" opacity="0.76"/>
    <path d="M900 150 C880 185 870 195 890 220" class="fabric-link" fill="none" stroke="#a78bfa" stroke-width="4" stroke-linecap="round" opacity="0.76"/>
    <rect x="557" y="169" width="176" height="28" rx="14" fill="#1b2740" stroke="#594b8f"/>
    <text x="645" y="188" class="link-label" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">full mesh</text>

    <path d="M440 290 C400 320 320 326 290 346" class="host-link" fill="none" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round" opacity="0.78"/>
    <path d="M440 290 C520 320 590 325 645 346" class="host-link" fill="none" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round" opacity="0.78"/>
    <path d="M440 290 C600 320 920 320 1000 346" class="host-link" fill="none" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round" opacity="0.78"/>
    <path d="M890 290 C730 320 370 320 290 346" class="host-link" fill="none" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round" opacity="0.78"/>
    <path d="M890 290 C810 320 700 325 645 346" class="host-link" fill="none" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round" opacity="0.78"/>
    <path d="M890 290 C930 320 970 326 1000 346" class="host-link" fill="none" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round" opacity="0.78"/>

    <g>
      <rect x="275" y="82" width="230" height="70" rx="13" fill="#39296e" stroke="#9b87f5" stroke-width="3"/>
      <text x="390" y="111" class="node-title" fill="#ffffff" font-family="Arial, sans-serif" font-size="19" font-weight="700" text-anchor="middle">Spectrum SN5600</text>
      <text x="390" y="134" class="node-sub" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Spine-1 / Cumulus Linux</text>
      <rect x="785" y="82" width="230" height="70" rx="13" fill="#39296e" stroke="#9b87f5" stroke-width="3"/>
      <text x="900" y="111" class="node-title" fill="#ffffff" font-family="Arial, sans-serif" font-size="19" font-weight="700" text-anchor="middle">Spectrum SN5600</text>
      <text x="900" y="134" class="node-sub" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Spine-2 / Cumulus Linux</text>
    </g>

    <g>
      <rect x="325" y="220" width="230" height="72" rx="13" fill="#064e4a" stroke="#2dd4bf" stroke-width="3"/>
      <text x="440" y="250" class="node-title" fill="#ffffff" font-family="Arial, sans-serif" font-size="19" font-weight="700" text-anchor="middle">Spectrum SN4600</text>
      <text x="440" y="274" class="node-sub" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Leaf-1 / Cumulus Linux</text>
      <rect x="775" y="220" width="230" height="72" rx="13" fill="#064e4a" stroke="#2dd4bf" stroke-width="3"/>
      <text x="890" y="250" class="node-title" fill="#ffffff" font-family="Arial, sans-serif" font-size="19" font-weight="700" text-anchor="middle">Spectrum SN4600</text>
      <text x="890" y="274" class="node-sub" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Leaf-2 / Cumulus Linux</text>
    </g>

    <g>
      <rect x="195" y="346" width="190" height="64" rx="12" fill="#10233d" stroke="#60a5fa" stroke-width="2"/>
      <text x="290" y="373" class="server-title" fill="#dbeafe" font-family="Arial, sans-serif" font-size="17" font-weight="700" text-anchor="middle">GPU node A</text><text x="290" y="396" class="server-sub" fill="#93c5fd" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">ConnectX-6/7</text>
      <rect x="550" y="346" width="190" height="64" rx="12" fill="#10233d" stroke="#60a5fa" stroke-width="2"/>
      <text x="645" y="373" class="server-title" fill="#dbeafe" font-family="Arial, sans-serif" font-size="17" font-weight="700" text-anchor="middle">GPU node B</text><text x="645" y="396" class="server-sub" fill="#93c5fd" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">ConnectX-6/7</text>
      <rect x="905" y="346" width="190" height="64" rx="12" fill="#10233d" stroke="#60a5fa" stroke-width="2"/>
      <text x="1000" y="373" class="server-title" fill="#dbeafe" font-family="Arial, sans-serif" font-size="17" font-weight="700" text-anchor="middle">GPU node C</text><text x="1000" y="396" class="server-sub" fill="#93c5fd" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">ConnectX-6/7</text>
    </g>
  </g>

  <g transform="translate(160 1057)">
    <line x1="0" y1="0" x2="58" y2="0" class="fabric-link" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/><text x="72" y="6" class="legend" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">spine-to-leaf fabric link</text>
    <line x1="390" y1="0" x2="448" y2="0" class="host-link" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round"/><text x="462" y="6" class="legend" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">dual-homed host link</text>
    <rect x="770" y="-13" width="28" height="24" rx="5" fill="#10233d" stroke="#60a5fa" stroke-width="2"/>
    <text x="812" y="6" class="legend" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">RoCEv2 endpoint</text>
  </g>
  <text x="700" y="1095" class="subtitle" fill="#a9b8cc" font-family="Arial, sans-serif" font-size="19" text-anchor="middle">Apply the same DSCP, PFC, ECN, MTU, and queue contract on every hop in the selected fabric.</text>
</svg>
