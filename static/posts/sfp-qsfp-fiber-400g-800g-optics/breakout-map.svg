<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#07111f"/>
  <text x="64" y="68" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700" fill="#e5eef9">Natural breakout patterns for parallel optics</text>
  <text x="64" y="104" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" fill="#9fb0c5">Breakout still requires switch port partitioning, compatible FEC and the correct MPO-to-LC or MPO-to-MPO cable map.</text>
  <defs><marker id="ab" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto"><path d="M0,0 L0,8 L10,4 z" fill="#49627e"/></marker></defs>
  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <rect x="70" y="190" width="250" height="130" rx="12" fill="#152944" stroke="#38bdf8" stroke-width="3"/>
    <text x="195" y="240" text-anchor="middle" font-size="26" font-weight="700" fill="#e5eef9">400G DR4</text><text x="195" y="278" text-anchor="middle" font-size="18" fill="#38bdf8">4 optical lane pairs</text>
    <line x1="335" y1="255" x2="455" y2="255" stroke="#49627e" stroke-width="3" marker-end="url(#ab)"/>
    <g><rect x="480" y="150" width="250" height="70" rx="9" fill="#10233b" stroke="#34d399" stroke-width="3"/><rect x="480" y="230" width="250" height="70" rx="9" fill="#10233b" stroke="#34d399" stroke-width="3"/><rect x="480" y="310" width="250" height="70" rx="9" fill="#10233b" stroke="#34d399" stroke-width="3"/><rect x="480" y="390" width="250" height="70" rx="9" fill="#10233b" stroke="#34d399" stroke-width="3"/></g>
    <g fill="#e5eef9" font-size="20" font-weight="700"><text x="605" y="193" text-anchor="middle">100G DR1</text><text x="605" y="273" text-anchor="middle">100G DR1</text><text x="605" y="353" text-anchor="middle">100G DR1</text><text x="605" y="433" text-anchor="middle">100G DR1</text></g>
    <rect x="70" y="470" width="250" height="130" rx="12" fill="#152944" stroke="#a78bfa" stroke-width="3"/>
    <text x="195" y="520" text-anchor="middle" font-size="26" font-weight="700" fill="#e5eef9">800G DR8</text><text x="195" y="558" text-anchor="middle" font-size="18" fill="#a78bfa">8 optical lane pairs</text>
    <line x1="335" y1="535" x2="820" y2="535" stroke="#49627e" stroke-width="3" marker-end="url(#ab)"/>
    <rect x="845" y="445" width="330" height="90" rx="10" fill="#10233b" stroke="#fbbf24" stroke-width="3"/><text x="1010" y="486" text-anchor="middle" font-size="23" font-weight="700" fill="#e5eef9">2 × 400G DR4</text><text x="1010" y="515" text-anchor="middle" font-size="16" fill="#9fb0c5">or 4 × 200G DR2</text>
    <rect x="845" y="550" width="330" height="90" rx="10" fill="#10233b" stroke="#fbbf24" stroke-width="3"/><text x="1010" y="604" text-anchor="middle" font-size="23" font-weight="700" fill="#e5eef9">8 × 100G DR1</text>
    <text x="800" y="270" font-size="22" font-weight="700" fill="#fbbf24">Important</text>
    <text x="800" y="310" font-size="18" fill="#e5eef9">A standard FR4/LR4 module combines</text><text x="800" y="340" font-size="18" fill="#e5eef9">four wavelengths into one Ethernet link.</text><text x="800" y="380" font-size="18" fill="#9fb0c5">Use an explicit 4×100G, 8×100G or</text><text x="800" y="410" font-size="18" fill="#9fb0c5">2×400G module when independent ports are required.</text>
  </g>
</svg>
