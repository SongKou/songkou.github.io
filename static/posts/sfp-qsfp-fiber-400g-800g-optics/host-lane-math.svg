<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#07111f"/>
  <defs><marker id="a" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto"><path d="M0,0 L0,8 L10,4 z" fill="#49627e"/></marker></defs>
  <text x="64" y="68" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700" fill="#e5eef9">How 400G and 800G are assembled from PAM4 lanes</text>
  <text x="64" y="104" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" fill="#9fb0c5">One modern 100G lane runs at about 53.125 Gbaud; PAM4 carries two bits per symbol.</text>
  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <text x="70" y="178" font-size="28" font-weight="700" fill="#38bdf8">400 Gigabit Ethernet</text>
    <rect x="70" y="210" width="190" height="105" rx="10" fill="#152944" stroke="#38bdf8" stroke-width="3"/>
    <text x="165" y="252" text-anchor="middle" font-size="21" font-weight="700" fill="#e5eef9">Switch ASIC</text><text x="165" y="282" text-anchor="middle" font-size="17" fill="#9fb0c5">400GE MAC + PCS/FEC</text>
    <line x1="275" y1="262" x2="365" y2="262" stroke="#49627e" stroke-width="3" marker-end="url(#a)"/>
    <g fill="#38bdf8"><rect x="380" y="210" width="310" height="18"/><rect x="380" y="238" width="310" height="18"/><rect x="380" y="266" width="310" height="18"/><rect x="380" y="294" width="310" height="18"/></g>
    <text x="535" y="342" text-anchor="middle" font-size="18" fill="#38bdf8">4 × 106.25 Gb/s = 425 Gb/s raw</text>
    <line x1="705" y1="262" x2="795" y2="262" stroke="#49627e" stroke-width="3" marker-end="url(#a)"/>
    <rect x="810" y="210" width="380" height="105" rx="10" fill="#152944" stroke="#38bdf8" stroke-width="3"/>
    <text x="1000" y="252" text-anchor="middle" font-size="21" font-weight="700" fill="#e5eef9">QSFP112 / QSFP-DD module</text><text x="1000" y="282" text-anchor="middle" font-size="17" fill="#9fb0c5">Electrical-to-optical conversion</text>
    <text x="70" y="430" font-size="28" font-weight="700" fill="#a78bfa">800 Gigabit Ethernet</text>
    <rect x="70" y="462" width="190" height="105" rx="10" fill="#152944" stroke="#a78bfa" stroke-width="3"/>
    <text x="165" y="504" text-anchor="middle" font-size="21" font-weight="700" fill="#e5eef9">Switch ASIC</text><text x="165" y="534" text-anchor="middle" font-size="17" fill="#9fb0c5">800GE MAC + PCS/FEC</text>
    <line x1="275" y1="514" x2="365" y2="514" stroke="#49627e" stroke-width="3" marker-end="url(#a)"/>
    <g fill="#a78bfa"><rect x="380" y="456" width="310" height="11"/><rect x="380" y="473" width="310" height="11"/><rect x="380" y="490" width="310" height="11"/><rect x="380" y="507" width="310" height="11"/><rect x="380" y="524" width="310" height="11"/><rect x="380" y="541" width="310" height="11"/><rect x="380" y="558" width="310" height="11"/><rect x="380" y="575" width="310" height="11"/></g>
    <text x="535" y="616" text-anchor="middle" font-size="18" fill="#a78bfa">8 × 106.25 Gb/s = 850 Gb/s raw</text>
    <line x1="705" y1="514" x2="795" y2="514" stroke="#49627e" stroke-width="3" marker-end="url(#a)"/>
    <rect x="810" y="462" width="380" height="105" rx="10" fill="#152944" stroke="#a78bfa" stroke-width="3"/>
    <text x="1000" y="504" text-anchor="middle" font-size="21" font-weight="700" fill="#e5eef9">QSFP-DD800 / OSFP module</text><text x="1000" y="534" text-anchor="middle" font-size="17" fill="#9fb0c5">Eight 100G host lanes</text>
  </g>
  <text x="64" y="686" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" fill="#9fb0c5">PCS framing and FEC consume the difference between the raw line rate and the nominal Ethernet payload rate.</text>
</svg>
