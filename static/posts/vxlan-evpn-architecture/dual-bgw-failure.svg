<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><rect width="1280" height="720" fill="#07111f"/><defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto"><path d="M0,0 L0,8 L10,4 z" fill="#49627e"/></marker><filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity=".25"/></filter></defs><text x="64" y="68" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="750" fill="#e5eef9">Dual-BGW failure behavior</text><text x="64" y="102" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="450" fill="#9fb0c5">Tracking withdraws an unusable path while the surviving BGW continues forwarding</text><g filter="url(#shadow)"><rect x="64" y="150" width="552" height="470" rx="16" fill="#101e31" stroke="#38bdf8" stroke-width="2"/><rect x="664" y="150" width="552" height="470" rx="16" fill="#101e31" stroke="#34d399" stroke-width="2"/><text x="340" y="205" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="29" font-weight="750" fill="#38bdf8">Failed BGW</text><text x="940" y="205" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="29" font-weight="750" fill="#34d399">Surviving BGW</text><text x="105" y="270" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="500" fill="#e5eef9">•  Fabric or DCI link lost</text><text x="105" y="338" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="500" fill="#e5eef9">•  Tracking detects isolation</text><text x="105" y="406" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="500" fill="#e5eef9">•  Routes/VIP path withdrawn</text><text x="105" y="474" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="500" fill="#e5eef9">•  No new traffic selected</text><text x="705" y="270" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="500" fill="#e5eef9">•  Healthy fabric and DCI links</text><text x="705" y="338" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="500" fill="#e5eef9">•  Remains valid for the site</text><text x="705" y="406" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="500" fill="#e5eef9">•  Carries unicast and BUM</text><text x="705" y="474" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="500" fill="#e5eef9">•  Restoration uses delay timer</text></g><text x="1216" y="685" text-anchor="end" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="500" fill="#9fb0c5">VXLAN EVPN Architecture</text></svg>