<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><rect width="1280" height="720" fill="#07111f"/><defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto"><path d="M0,0 L0,8 L10,4 z" fill="#49627e"/></marker><filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity=".25"/></filter></defs><text x="64" y="68" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="750" fill="#e5eef9">Multi-Pod vs Multi-Site</text><text x="64" y="102" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="450" fill="#9fb0c5">Choose the boundary according to scale, failure isolation, and operations</text><g filter="url(#shadow)"><rect x="64" y="150" width="552" height="470" rx="16" fill="#101e31" stroke="#38bdf8" stroke-width="2"/><rect x="664" y="150" width="552" height="470" rx="16" fill="#101e31" stroke="#34d399" stroke-width="2"/><text x="340" y="205" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="29" font-weight="750" fill="#38bdf8">Multi-Pod</text><text x="940" y="205" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="29" font-weight="750" fill="#34d399">Multi-Site</text><text x="105" y="270" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="500" fill="#e5eef9">•  One end-to-end control plane</text><text x="105" y="338" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="500" fill="#e5eef9">•  One extended underlay</text><text x="105" y="406" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="500" fill="#e5eef9">•  One BUM and VNI domain</text><text x="105" y="474" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="500" fill="#e5eef9">•  Simple; larger blast radius</text><text x="705" y="270" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="500" fill="#e5eef9">•  Independent site fabrics</text><text x="705" y="338" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="500" fill="#e5eef9">•  Isolated underlays</text><text x="705" y="406" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="500" fill="#e5eef9">•  Selective VNI extension</text><text x="705" y="474" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="500" fill="#e5eef9">•  Controlled inter-site boundary</text></g><text x="1216" y="685" text-anchor="end" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="500" fill="#9fb0c5">VXLAN EVPN Architecture</text></svg>