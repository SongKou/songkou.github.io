<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><rect width="1280" height="720" fill="#07111f"/><defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto"><path d="M0,0 L0,8 L10,4 z" fill="#49627e"/></marker><filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity=".25"/></filter></defs><text x="64" y="68" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="750" fill="#e5eef9">VXLAN packet format</text><text x="64" y="102" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="450" fill="#9fb0c5">MAC-in-UDP encapsulation with a 24-bit VXLAN Network Identifier</text><g filter="url(#shadow)"><rect x="64" y="270" width="150" height="150" rx="8" fill="#152944" stroke="#38bdf8" stroke-width="3"/><text x="139.0" y="335" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700" fill="#e5eef9"><tspan x="139.0" dy="0">Outer Ethernet</tspan></text><rect x="224" y="270" width="150" height="150" rx="8" fill="#152944" stroke="#22d3ee" stroke-width="3"/><text x="299.0" y="335" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700" fill="#e5eef9"><tspan x="299.0" dy="0">Outer IP</tspan></text><rect x="384" y="270" width="150" height="150" rx="8" fill="#152944" stroke="#34d399" stroke-width="3"/><text x="459.0" y="335" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700" fill="#e5eef9"><tspan x="459.0" dy="0">UDP :4789</tspan></text><rect x="544" y="270" width="190" height="150" rx="8" fill="#152944" stroke="#fbbf24" stroke-width="3"/><text x="639.0" y="335" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700" fill="#e5eef9"><tspan x="639.0" dy="0">VXLAN + VNI</tspan></text><rect x="744" y="270" width="320" height="150" rx="8" fi